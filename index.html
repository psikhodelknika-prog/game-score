<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пульт: Своя Игра</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #3498db; }
        .team-name { font-size: 1.2em; font-weight: bold; width: 90%; border: none; border-bottom: 2px dashed #ccc; text-align: center; margin-bottom: 15px; outline: none; padding: 5px; }
        .team-name:focus { border-bottom-color: #3498db; background: #f9f9f9; }
        .score { font-size: 3.5rem; font-weight: 900; margin: 15px 0; color: #2c3e50; transition: all 0.3s; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { border: none; border-radius: 6px; padding: 12px 5px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s, background 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-add { background-color: #2ecc71; color: white; }
        .btn-add:hover { background-color: #27ae60; }
        .btn-sub { background-color: #e74c3c; color: white; grid-column: span 3; margin-top: 5px; }
        .btn-sub:hover { background-color: #c0392b; }
        .reset-all { margin-top: 40px; background: #95a5a6; color: white; padding: 10px 20px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Экономическая «Своя игра»</h1>

    <div class="grid" id="game-grid">
        <!-- Команды генерируются скриптом -->
    </div>

    <button class="reset-all" onclick="resetAll()">Сбросить все баллы</button>

    <script>
        const teamsCount = 6;
        const points = [10, 20, 30, 40, 50];
        const penalty = -20;

        // Создание карточек команд
        const grid = document.getElementById('game-grid');
        for (let i = 1; i <= teamsCount; i++) {
            grid.innerHTML += `
                <div class="card">
                    <input type="text" class="team-name" value="Команда ${i}" placeholder="Название...">
                    <div id="score${i}" class="score">0</div>
                    <div class="btn-group">
                        ${points.map(p => `<button class="btn-add" onclick="change(${i}, ${p})">+${p}</button>`).join('')}
                        <button class="btn-sub" onclick="change(${i}, ${penalty})">Штраф (${penalty})</button>
                    </div>
                </div>
            `;
        }

        function change(teamId, val) {
            const scoreEl = document.getElementById('score' + teamId);
            let current = parseInt(scoreEl.innerText);
            scoreEl.innerText = current + val;
            
            // Визуальный эффект при изменении
            scoreEl.style.transform = "scale(1.2)";
            setTimeout(() => scoreEl.style.transform = "scale(1)", 200);
        }

        function resetAll() {
            if(confirm("Точно сбросить все баллы?")) {
                for (let i = 1; i <= teamsCount; i++) {
                    document.getElementById('score' + i).innerText = 0;
                }
            }
        }
    </script>
</body>
</html>
